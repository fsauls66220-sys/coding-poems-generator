<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css">
    <title>AI Coding Poem Generator</title>
</head>
<body>
  <div class="container"> 
  <header>
    <h1>AI Coding Poem Generator</h1>
  </header>

  <main>
    <form id="poem-generator-form">
        <input
        type="text" 
        placeholder="Enter the topic of the Coding poem" 
        autofocus
        required
        autocomplete="off"
        class="instructions"
        />
        <input type="submit" class="submit-button" />
    </form>
    <div class="poem" id="poem">
    </div>
  </main>

   <footer>
    This AI project was created by <a href="https://github.com/fsauls66220-sys/coding-poems-generator" target="_blank">Felicia Sauls</a> and
    is
    <a 
        href="https://github.com/fsauls66220-sys/coding-poems-generator"
        target="_blank"
    >
        open-sourced on GitHub</a>
        
        and is <a href="https://coding-poem-generator.netlify.app" target="_blank">hosted on Netlify</a>.
    </footer>
   </div>

  <script src="src/index.js"></script>
 </body>
</html>
